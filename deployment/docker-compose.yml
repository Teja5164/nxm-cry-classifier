version: "3.9"

services:
  cry-classifier:
    build:
      context: ..                          # build context = project root (ML_pipeline/)
      dockerfile: deployment/Dockerfile    # Dockerfile location relative to context
    ports:
      - "8000:8000"
    environment:
      - KMP_DUPLICATE_LIB_OK=TRUE
    volumes:
      # Mount model weights (excluded from Docker image -- too large)
      - ../models:/app/models:ro
      # Mount norm_stats and features
      - ../training/features:/app/training/features:ro
    # For GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
