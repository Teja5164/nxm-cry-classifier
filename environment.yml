name: babycare_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Conda packages ──────────────────────────────────────────
  - numpy
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - pandas
  - tqdm

  # ── Pip packages (PyTorch + audio + API) ────────────────────
  - pip:
    # CPU build (works everywhere). For GPU with CUDA 12.4, replace with:
    # torch==2.6.0+cu124 --index-url https://download.pytorch.org/whl/cu124
    - torch
    - librosa
    - soundfile
    - transformers
    - gdown
    - requests
    - fastapi
    - "uvicorn[standard]"
    - python-multipart
    - scipy
    - scikit-learn

# ============================================================
# Usage:
#   conda env create -f environment.yml
#   conda activate babycare_env
#
# For GPU (CUDA 12.4), after creating the env run:
#   pip install torch==2.6.0+cu124 --index-url https://download.pytorch.org/whl/cu124
#
# Update existing env:
#   conda env update -f environment.yml --prune
# ============================================================
